<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAAB Logo Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #3730D4; --white: #FAFAF8; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
      padding: 60px 40px;
    }

    .label {
      color: rgba(255,255,255,0.25);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: sans-serif;
      text-align: center;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .variant {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LOGO LOCKUP ── */
    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 0;
      line-height: 1;
    }

    .logo-en {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    /* Vertical rule */
    .logo-rule {
      width: 1px;
      height: 64px;
      margin: 0 22px;
      flex-shrink: 0;
    }

    .logo-ar {
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 88px;
      line-height: 1;
      direction: rtl;
      /* Cairo renders slightly lower — nudge up to optically align */
      position: relative;
      top: -4px;
    }

    /* ── ON BLUE ── */
    .on-blue {
      background: var(--blue);
      padding: 56px 72px;
      border-radius: 3px;
    }
    .on-blue .logo-en { color: var(--white); }
    .on-blue .logo-rule { background: rgba(255,255,255,0.3); }
    .on-blue .logo-ar  { color: var(--white); }

    /* ── ON WHITE ── */
    .on-white {
      background: var(--white);
      padding: 56px 72px;
      border-radius: 3px;
    }
    .on-white .logo-en { color: var(--blue); }
    .on-white .logo-rule { background: rgba(55,48,212,0.3); }
    .on-white .logo-ar  { color: var(--blue); }

    /* ── ON BLACK ── */
    .on-black {
      background: #0A0A0A;
      padding: 56px 72px;
      border-radius: 3px;
    }
    .on-black .logo-en { color: var(--white); }
    .on-black .logo-rule { background: rgba(255,255,255,0.25); }
    .on-black .logo-ar  { color: var(--white); }

    @media (max-width: 640px) {
      .logo-en, .logo-ar { font-size: 56px; }
      .logo-rule { height: 42px; margin: 0 14px; }
      .on-blue, .on-white, .on-black { padding: 40px 36px; }
    }
  </style>
</head>
<body>

  <p class="label">BAAB — Bilingual Logo</p>

  <div class="row">

    <div class="variant">
      <p class="label">On Brand Blue</p>
      <div class="on-blue">
        <div class="logo-lockup">
          <span class="logo-en">BAAB</span>
          <div class="logo-rule"></div>
          <span class="logo-ar">باب</span>
        </div>
      </div>
    </div>

    <div class="variant">
      <p class="label">On White</p>
      <div class="on-white">
        <div class="logo-lockup">
          <span class="logo-en">BAAB</span>
          <div class="logo-rule"></div>
          <span class="logo-ar">باب</span>
        </div>
      </div>
    </div>

    <div class="variant">
      <p class="label">On Black</p>
      <div class="on-black">
        <div class="logo-lockup">
          <span class="logo-en">BAAB</span>
          <div class="logo-rule"></div>
          <span class="logo-ar">باب</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>

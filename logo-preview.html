<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAAB Logo Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #3730D4; --white: #FAFAF8; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 60px;
      padding: 60px 40px;
      font-family: sans-serif;
    }

    .label {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── CARD ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── LOGO UNIT ── */
    .logo-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 0;
    }

    /* On blue */
    .on-blue {
      background: var(--blue);
      padding: 60px 80px;
      border-radius: 4px;
    }
    .on-blue .en {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      letter-spacing: 0.12em;
      color: var(--white);
      line-height: 1;
      display: block;
    }
    .on-blue .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 10px 0;
    }
    .on-blue .ar {
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 52px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.06em;
      direction: rtl;
      display: block;
      line-height: 1.1;
    }

    /* On white */
    .on-white {
      background: var(--white);
      padding: 60px 80px;
      border-radius: 4px;
    }
    .on-white .en {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      letter-spacing: 0.12em;
      color: var(--blue);
      line-height: 1;
      display: block;
    }
    .on-white .divider {
      width: 100%;
      height: 1px;
      background: rgba(55,48,212,0.25);
      margin: 10px 0;
    }
    .on-white .ar {
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 52px;
      color: rgba(55,48,212,0.75);
      letter-spacing: 0.06em;
      direction: rtl;
      display: block;
      line-height: 1.1;
    }

    /* On black */
    .on-black {
      background: #0A0A0A;
      padding: 60px 80px;
      border-radius: 4px;
    }
    .on-black .en {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      letter-spacing: 0.12em;
      color: var(--white);
      line-height: 1;
      display: block;
    }
    .on-black .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 10px 0;
    }
    .on-black .ar {
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 52px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
      direction: rtl;
      display: block;
      line-height: 1.1;
    }

    .row {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .variant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
  </style>
</head>
<body>

  <p class="label">BAAB — Logo Variants</p>

  <div class="row">

    <!-- Blue background -->
    <div class="variant">
      <p class="label">On Brand Blue</p>
      <div class="on-blue">
        <div class="logo-unit">
          <span class="en">BAAB</span>
          <div class="divider"></div>
          <span class="ar">باب</span>
        </div>
      </div>
    </div>

    <!-- White background -->
    <div class="variant">
      <p class="label">On White</p>
      <div class="on-white">
        <div class="logo-unit">
          <span class="en">BAAB</span>
          <div class="divider"></div>
          <span class="ar">باب</span>
        </div>
      </div>
    </div>

    <!-- Black background -->
    <div class="variant">
      <p class="label">On Black</p>
      <div class="on-black">
        <div class="logo-unit">
          <span class="en">BAAB</span>
          <div class="divider"></div>
          <span class="ar">باب</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
